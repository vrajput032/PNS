  <text x="88" y="58" font-family="Poppins, Arial, sans-serif" font-weight="700" font-size="14" fill="#d4a017" letter-spacing="3.5">ENTERPRISES</text>
  <text x="88" y="74" font-family="Inter, Arial, sans-serif" font-weight="600" font-size="9" fill="#101a3d" letter-spacing="1.8">GEYSER PIPE MANUFACTURER</text>
