      <stop offset="0%" stop-color="#101a3d"/>
      <stop offset="100%" stop-color="#16224f"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0c440"/>
